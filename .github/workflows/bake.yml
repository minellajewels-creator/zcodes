name: 🔥 Bake & Deploy Site

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    name: Bake Static Site
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔥 Bake static site
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          BASE_PATH: "/zcodes"
        run: node bake.js

      - name: 📤 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html pages/ content.json 404.html
          git diff --staged --quiet || git commit -m "chore: bake site [skip ci]"
          git push
